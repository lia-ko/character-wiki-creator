<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Wiki Creator</title>
<style id="appcss">
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* app bar */
  .appbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;display:flex;align-items:center;gap:14px;padding:0 18px;
    background:var(--panel);border-bottom:1px solid var(--rule);overflow-x:auto}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;white-space:nowrap}
  .brand .mk{color:var(--accent-soft);font-family:var(--head);font-size:1.1rem}
  .brand span{color:var(--accent)}
  .crumbs{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
  .crumbs a{color:var(--muted);cursor:pointer}.crumbs a:hover{color:var(--ink)}
  .crumbs b{color:var(--ink);font-weight:400}
  .crumbs .sepc{opacity:.5}
  .appbar .grow{flex:1}
  .unsaved{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;color:var(--faint);display:none;align-items:center;gap:6px;white-space:nowrap}
  .unsaved.on{display:flex}.unsaved .u{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .filechip{font-family:var(--mono);font-size:.6rem;letter-spacing:.05em;color:var(--muted);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
  .filechip:empty{display:none}
  .abtn{font:inherit;font-size:.78rem;background:var(--panel-2);color:var(--ink);border:1px solid var(--rule);border-radius:8px;padding:7px 13px;cursor:pointer;white-space:nowrap}
  .abtn:hover{border-color:var(--accent)}
  .abtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .appbar select{font:inherit;font-size:.75rem;background:var(--panel-2);color:var(--ink);border:1px solid var(--rule);border-radius:7px;padding:6px 9px}

  #stage{padding-top:52px;min-height:100vh}

  /* ---- projects + hub grids ---- */
  .wrap{max-width:1180px;margin:0 auto;padding:40px 26px 90px}
  .hero{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--rule)}
  .hero .eyebrow{font-family:var(--mono);font-size:.64rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
  .hero h1,.hero .htitle{font-family:var(--head);font-weight:400;font-size:calc(clamp(2rem,5vw,3.2rem)*var(--hs,1));line-height:1;margin:0;color:var(--ink);background:none;border:none;outline:none;width:100%;max-width:640px}
  .hero .htitle:focus{border-bottom:1px solid var(--rule)}
  .hero .count{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:11px}
  .hero .htools{display:flex;align-items:center;gap:10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
  .grid.proj{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

  .card{position:relative;background:var(--panel);border:1px solid var(--rule);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 14px 32px rgba(0,0,0,.4)}
  .card .portrait{aspect-ratio:3/4;background:var(--panel-2) center/cover;position:relative;display:flex;align-items:center;justify-content:center}
  .card .portrait .ini{font-family:var(--head);font-size:3rem;color:var(--line)}
  .card .portrait::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.72))}
  .card .meta{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:13px 14px}
  .card .nm{font-family:var(--head);font-size:calc(1.28rem*var(--hs,1));line-height:1.05;color:#fff}
  .card .clan{font-family:var(--mono);font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-soft);margin-top:5px}
  .card .kebab{position:absolute;top:9px;right:9px;z-index:3;width:24px;height:24px;border-radius:7px;border:none;background:rgba(0,0,0,.5);color:#fff;cursor:pointer;opacity:0;transition:opacity .12s;font-size:.9rem;line-height:1}
  .card:hover .kebab{opacity:1}.card .kebab:hover{background:var(--accent)}

  .pcard{position:relative;background:var(--panel);border:1px solid var(--rule);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;display:flex;flex-direction:column}
  .pcard:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 16px 36px rgba(0,0,0,.5)}
  .pcard .accent{height:4px;background:var(--accent)}
  .mosaic{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;aspect-ratio:2/1;background:var(--rule)}
  .mosaic .m{background:var(--panel-2) center/cover;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:1.3rem;color:var(--line)}
  .mosaic .m.more{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
  .pbody{padding:15px 17px 17px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .pbody .pt{font-family:var(--head);font-size:calc(1.5rem*var(--hs,1));line-height:1.05;color:var(--ink)}
  .pbody .pmeta{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-soft);margin-top:6px}
  .pbody .pcount{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .pcard .kebab{position:absolute;top:11px;right:11px;z-index:3;width:24px;height:24px;border-radius:7px;border:none;background:rgba(0,0,0,.5);color:#fff;cursor:pointer;opacity:0;transition:opacity .12s;font-size:.9rem;line-height:1}
  .pcard:hover .kebab{opacity:1}.pcard .kebab:hover{background:var(--accent)}

  .newcard{border:1px dashed var(--rule);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);cursor:pointer;aspect-ratio:3/4}
  .newcard.wide{aspect-ratio:auto;min-height:200px}
  .newcard:hover{border-color:var(--accent);color:var(--ink);background:var(--line)}
  .newcard .plus{font-size:1.8rem;font-family:var(--head)}
  .newcard small{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase}

  .genre-in{background:none;border:none;outline:none;color:var(--muted);font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid transparent}
  .genre-in:focus{border-bottom-color:var(--rule)}
  .fontsample{border:1px solid var(--rule);border-radius:12px;background:var(--panel);padding:18px 22px;margin:0 0 26px}
  .fontsample .fs-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
  .fontsample .fs-h{font-family:var(--head);font-size:calc(1.9rem*var(--hs,1));color:var(--ink);line-height:1.1}
  .fontsample .fs-b{font-family:var(--body);font-size:calc(1.02rem*var(--bs,1));line-height:1.62;color:var(--ink);opacity:.92;margin-top:9px;max-width:74ch}
  .fontsample .fs-i{font-style:italic}

  /* ---- character editor chrome ---- */
  .charbar{display:flex;align-items:center;gap:12px;padding:10px 22px;border-bottom:1px solid var(--rule);background:var(--panel);flex-wrap:wrap}
  .charbar .grow{flex:1}
  .charbar .cbt{font-family:var(--head);font-size:1.1rem;color:var(--ink)}
  .charbar button,.charbar select{font:inherit;font-size:.74rem;background:var(--panel-2);color:var(--ink);border:1px solid var(--rule);border-radius:7px;padding:6px 11px;cursor:pointer}
  .charbar button:hover{border-color:var(--accent)}

  /* inline-edit affordances */
  .ce{outline:none;border-radius:3px;cursor:text;transition:background .1s,box-shadow .1s}
  .ce:hover{background:var(--line)}.ce:focus{background:var(--line);box-shadow:0 0 0 1px var(--accent)}
  .ce.ml{white-space:pre-wrap;display:block;min-height:1.4em;font-family:var(--body);font-size:calc(1rem*var(--bs,1))}
  .ce:empty:before{content:attr(data-ph);color:var(--faint);font-style:italic}
  .delx{border:none;background:none;color:var(--faint);cursor:pointer;font-size:.9rem;line-height:1;padding:2px 6px;border-radius:4px}
  .delx:hover{color:#fff;background:var(--accent)}
  .addbtn{width:100%;margin-top:8px;border:1px dashed var(--rule);background:none;color:var(--muted);border-radius:8px;padding:9px;cursor:pointer;font-family:var(--sans);font-size:.8rem}
  .addbtn:hover{border-color:var(--accent);color:var(--ink)}
  .addbtn.sm{width:auto;margin:6px 0 0;padding:5px 12px}
  .imgpick{cursor:pointer;position:relative}
  .imgpick:hover{outline:2px solid var(--accent);outline-offset:-2px}
  .imgpick .pickhint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:center;padding:6px}
  .relentry.editing{padding:0}
  .relentry.editing .ehead{display:grid;grid-template-columns:52px 1fr auto;gap:14px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--rule)}
  .relentry.editing .ehead .nm{font-family:var(--head);font-size:calc(1.15rem*var(--hs,1));color:var(--ink)}
  .relentry.editing .ehead .meta{display:flex;gap:6px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-soft);margin-top:5px}
  .linksel{font-family:var(--sans);font-size:.7rem;background:var(--panel-2);color:var(--muted);border:1px solid var(--rule);border-radius:6px;padding:4px 8px;margin:8px 0 0 16px}
  .tedit{display:grid;grid-template-columns:1fr 1.4fr auto;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)}
  .tedit .tn{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;color:var(--ink)}
  .tedit .td{font-size:.86rem;color:var(--muted)}
  .caredit{display:flex;gap:8px;justify-content:center;padding:8px;border-top:1px solid var(--rule);background:var(--panel)}
  .caredit button{font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--rule);background:none;color:var(--muted);border-radius:5px;padding:5px 10px;cursor:pointer}
  .caredit button:hover{border-color:var(--accent);color:var(--ink)}
  .exc.editing,.musicedit{border:1px solid var(--rule);border-radius:8px;background:var(--panel);padding:12px 14px;margin-bottom:8px}
  .statedit{display:grid;grid-template-columns:40% 1fr auto;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line)}
  .statedit .k{font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  .hint{font-family:var(--sans);font-size:.72rem;color:var(--faint);margin:0 0 8px}
</style>
<style id="fontface"></style>
<style id="wikicss"></style>
<style id="palvars"></style>
</head>
<body>
  <div class="appbar">
    <span class="brand"><span class="mk">✦</span> Wiki <span>Creator</span></span>
    <span class="crumbs" id="crumbs"></span>
    <span class="grow"></span>
    <span class="unsaved" id="unsaved"><span class="u"></span> unsaved</span>
    <span class="filechip" id="fileName"></span>
    <button class="abtn" id="btnOpenFolder">Open folder</button>
    <button class="abtn" id="btnOpenZip">Open .zip</button>
    <button class="abtn" id="btnSaveAs" style="display:none">Save as…</button>
    <button class="abtn primary" id="btnSave">Save .zip</button>
  </div>
  <div id="stage"></div>

  <input type="file" id="imgPicker" accept="image/*" style="display:none">
  <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
  <input type="file" id="zipInput" accept=".zip,application/zip" style="display:none">

<script>
"use strict";

/* ============ PALETTES ============ */

  {id:"ivory",    name:"Ivory (light)",bg:"#f2ece0",panel:"#f8f3ea",panel2:"#e9e0cf",ink:"#241f18",muted:"#6b6153",faint:"#938876",accent:"#9a4a34",accentSoft:"#a5654f",rule:"#ddd2bf",line:"rgba(36,31,24,.10)"},
  {id:"fog",      name:"Fog (light)",bg:"#eceef1",panel:"#f6f8fa",panel2:"#e2e6ec",ink:"#1a1f26",muted:"#5b6673",faint:"#8994a2",accent:"#4a6b96",accentSoft:"#6f8bb0",rule:"#d3d9e1",line:"rgba(26,31,38,.09)"}
];
function palById(id){ for(var i=0;i<PALETTES.length;i++) if(PALETTES[i].id===id) return PALETTES[i]; return PALETTES[1]; }
function paletteVars(p){ return ":root{--bg:"+p.bg+";--panel:"+p.panel+";--panel-2:"+p.panel2+";--ink:"+p.ink+";--muted:"+p.muted+";--faint:"+p.faint+";--accent:"+p.accent+";--accent-soft:"+p.accentSoft+";--rule:"+p.rule+";--line:"+p.line+"}"; }

  {id:"dm-serif-display",name:"DM Serif Display",family:"DM Serif Display",cat:"serif",dir:"DM_Serif_Display",file:"DMSerifDisplay-Regular.ttf",ital:"DMSerifDisplay-Italic.ttf",varr:false},

  {id:"fraunces",name:"Fraunces",family:"Fraunces",cat:"serif",dir:"Fraunces",file:"Fraunces-VariableFont_SOFT,WONK,opsz,wght.ttf",ital:"Fraunces-Italic-VariableFont_SOFT,WONK,opsz,wght.ttf",varr:true},

function stackOf(id){ var f=faceById(id); return "'"+f.family+"',"+(f.cat==='sans'?'sans-serif':'serif'); }
function fontVars(headId, bodyId, hs, bs){ return ":root{--head:"+stackOf(headId)+";--body:"+stackOf(bodyId)+";--hs:"+(hs||1)+";--bs:"+(bs||1)+";--sans:system-ui,'Helvetica Neue',Arial,sans-serif;--mono:ui-monospace,'SFMono-Regular',Menlo,'Courier New',monospace}"; }

function faceCSS(prefix,f){ function ff(file,style){ return '@font-face{font-family:"'+f.family+'";font-style:'+style+';font-weight:'+(f.varr?'100 900':'400')+';font-display:swap;src:url("'+prefix+f.dir+'/'+file+'") format("truetype")}'; } var s=ff(f.file,'normal'); if(f.ital) s+=ff(f.ital,'italic'); return s; }
function fontFaceCSS(prefix,ids){ var arr=ids?ids.map(faceById):FACES,seen={},out=''; arr.forEach(function(f){ if(f&&!seen[f.id]){ seen[f.id]=1; out+=faceCSS(prefix,f); } }); return out; }

/* ============ CLEAN RENDER: character wiki ============ */
function renderWiki(data, opts){
  opts = opts||{};
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function slug(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'sec'; }
  /* body is pre-sanitized safe HTML (escaped text + <b>/<i>, \n for breaks) — do NOT re-escape */
  function paras(t){ if(!t||!String(t).trim()) return '<p class="empty">—</p>'; return String(t).split(/\n\s*\n/).filter(function(x){return x.trim();}).map(function(x){ return "<p>"+x.replace(/\n/g,"<br>")+"</p>"; }).join(""); }
  var d=data, links=opts.links||{};
  var navBio=(d.bio||[]).map(function(s){ return '<li><a href="#'+esc(slug(s.h))+'">'+esc(s.h||'Section')+'</a></li>'; }).join('');
  var ports=d.portraits||[];
  var carousel = '<div class="ib-carousel"><div class="ib-stage" data-idx="0">'+ (ports.length? ports.map(function(src,i){ return '<div class="cslide"'+(i===0?' style="display:flex"':'')+'><img src="'+esc(src)+'" alt=""></div>'; }).join('') : '<div class="cslide" style="display:flex">Portrait</div>') +'</div>'+ (ports.length>1?'<div class="cnav"><button type="button" class="cbtn cprev">&lsaquo;</button><span class="ccount">1 / '+ports.length+'</span><button type="button" class="cbtn cnext">&rsaquo;</button></div>':'') +'</div>';
  var stats=(d.stats||[]).filter(function(s){return s.k;}).map(function(s){ return '<div class="r"><span class="k">'+esc(s.k)+'</span><span class="v">'+(s.v?esc(s.v):'<span class="empty">—</span>')+'</span></div>'; }).join('');
  function relName(r){ var nm=esc(r.name||'—'); if(r.targetId && links[r.targetId]) nm='<a href="'+esc(links[r.targetId])+'">'+nm+'</a>'; return nm; }
  var related=(d.relationships||[]).map(function(r){ return '<a'+(r.targetId&&links[r.targetId]?' href="'+esc(links[r.targetId])+'"':'')+'>'+esc(r.name||'—')+' <span>'+esc(r.role||'')+'</span></a>'; }).join('');
  var listen=(d.music||[]).map(function(m){ var t=esc(m.title||'playlist'); return m.link?'<a href="'+esc(m.link)+'" target="_blank" rel="noopener">'+t+' <span>listen</span></a>':'<a>'+t+' <span>—</span></a>'; }).join('');
  var bioHtml=(d.bio||[]).map(function(s){ return '<h3 id="'+esc(slug(s.h))+'">'+esc(s.h||'Section')+'</h3>'+paras(s.body); }).join('');
  var relHtml=(d.relationships||[]).map(function(r,i){
    var thumb=r.img?'<span class="thumb" style="background-image:url('+esc(r.img)+')"></span>':'<span class="thumb">Img</span>';
    var port=r.img?'<div class="port" style="background-image:url('+esc(r.img)+')"></div>':'<div class="port">Portrait</div>';
    var meta=esc([r.role,r.status].filter(Boolean).join(' · '));
    return '<details class="relentry"'+(i===0?' open':'')+'><summary>'+thumb+'<span><span class="nm">'+relName(r)+'</span>'+(meta?'<span class="rl">'+meta+'</span>':'')+'</span><span class="chev"></span></summary><div class="rbody">'+port+'<div class="txt">'+paras(r.body)+'</div></div></details>';
  }).join('');
  var tropeHtml=(d.tropeCats||[]).map(function(c){ var chips=(c.items||[]).map(function(t){ if(t.note&&t.note.trim()) return '<details class="chip"><summary>'+esc(t.name)+'</summary><span class="note">'+esc(t.note)+'</span></details>'; return '<span class="chip static">'+esc(t.name)+'</span>'; }).join(''); return '<div class="tcat"><h4>'+esc(c.name||'Category')+'</h4><div class="chips">'+chips+'</div></div>'; }).join('');
  var excHtml=(d.excerpts||[]).map(function(e,i){ return '<details class="exc"'+(i===0?' open':'')+'><summary>'+esc(e.title||'Excerpt')+'</summary><div class="eb">'+paras(e.body)+(e.source?'<div class="src">'+esc(e.source)+'</div>':'')+'</div></details>'; }).join('');
  var crumb = opts.hubHref ? '<a href="'+esc(opts.hubHref)+'"><b>&larr; Characters</b></a>' : '<b>Characters</b>';
  var topbar = opts.noTopbar? '' : '<div class="topbar"><span class="crumb">'+crumb+'</span><span class="title">'+esc(d.name||'')+'</span><span class="search">Search…</span></div>';
  return topbar+'<div class="wbody"><nav class="toc">'+
    '<details class="grp" open><summary>Overview</summary><ul class="sub"><li><a href="#top">Summary</a></li></ul></details>'+
    (navBio?'<details class="grp" open><summary>Biography</summary><ul class="sub">'+navBio+'</ul></details>':'')+
    '<details class="grp" open><summary>Relationships</summary><ul class="sub"><li><a href="#rel">All</a></li></ul></details>'+
    '<details class="grp"><summary>Personality</summary><ul class="sub"><li><a href="#tropes">Tropes</a></li></ul></details>'+
    '<details class="grp"><summary>Appendices</summary><ul class="sub"><li><a href="#excerpts">Excerpts</a></li>'+(listen?'<li><a href="#music">Music</a></li>':'')+'</ul></details>'+
    '</nav><main class="article" id="top">'+
      (d.summary?'<p class="lead">'+String(d.summary).replace(/\n/g,'<br>')+'</p>':'')+
      (bioHtml?'<h2>Biography</h2>'+bioHtml:'')+
      '<h2 id="rel">Relationships</h2><div class="rels">'+(relHtml||'<p class="empty">No relationships yet.</p>')+'</div>'+
      '<h2 id="tropes">Tropes</h2><div class="tropecats">'+(tropeHtml||'<p class="empty">No tropes yet.</p>')+'</div>'+
      '<h2 id="excerpts">Excerpts</h2>'+(excHtml||'<p class="empty">Nothing here yet.</p>')+
      (listen?'<h2 id="music">Music</h2><div class="ib-list wide">'+listen+'</div>':'')+
    '</main><aside class="infobox">'+carousel+
      '<div class="ib-name">'+esc(d.name||'')+'</div>'+(d.eyebrow?'<div class="ib-tag">'+esc(d.eyebrow)+'</div>':'')+
      '<div class="ib-rows">'+stats+'</div>'+
      (related?'<div class="ib-h">Related</div><div class="ib-list">'+related+'</div>':'')+
      (listen?'<div class="ib-h">Listen</div><div class="ib-list">'+listen+'</div>':'')+
    '</aside></div>';
}

/* ============ CLEAN RENDER: character hub (main.html) ============ */
function renderHubPage(project, opts){
  opts=opts||{};
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  var hrefs=opts.hrefs||{};

}

/* ============ CLEAN RENDER: projects index (index.html) ============ */
function renderProjectsIndex(ws, opts){
  opts=opts||{};
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  var hrefs=opts.hrefs||{};
  var cards=(ws.projects||[]).map(function(p){

/* build the whole set of files for the zip */
function buildAllFiles(ws){
  var files=[]; var projHrefs={};
  ws.projects.forEach(function(p){
    var pfolder=uniqueSlug(p.name, usedFolders); usedFolders[pfolder]=1;
    projHrefs[p.id]=pfolder+'/main.html';
    var charHrefs={}, usedC={};
    p.characters.forEach(function(c){ var cs=uniqueSlug(c.name,usedC); usedC[cs]=1; charHrefs[c.id]=cs+'.html'; });
    p.characters.forEach(function(c){
      var linkMap={}; p.characters.forEach(function(o){ if(o!==c) linkMap[o.id]=charHrefs[o.id]; });
      files.push({name:pfolder+'/'+charHrefs[c.id], text:buildCharacterFile(c,p,linkMap)});
    });
    files.push({name:pfolder+'/main.html', text:buildHubFile(p,charHrefs)});
  });
  files.push({name:'index.html', text:buildIndexFile(ws,projHrefs)});
  return files;
}
var usedFolders={};
function uniqueSlug(name, used){ var base=slugify(name), s=base, i=2; while(used[s]){ s=base+'-'+i; i++; } return s; }

/* ============ ZIP (store, no compression) ============ */
var CRCT=(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(u8){var c=0xFFFFFFFF;for(var i=0;i<u8.length;i++)c=CRCT[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function u16(n){return [n&255,(n>>>8)&255];}
function u32(n){return [n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255];}
function buildZip(files){
  var enc=new TextEncoder(); var parts=[]; var central=[]; var offset=0;
  files.forEach(function(f){
    var nameB=enc.encode(f.name), dataB=f.bytes?f.bytes:enc.encode(f.text), crc=crc32(dataB);
    var lh=new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(dataB.length),u32(dataB.length),u16(nameB.length),u16(0)));
    parts.push(lh,nameB,dataB);
    var ch=new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(dataB.length),u32(dataB.length),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)));
    central.push(ch,nameB);
    offset+=lh.length+nameB.length+dataB.length;
  });
  var cdSize=0; central.forEach(function(c){cdSize+=c.length;});
  var eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(offset),u16(0)));
  return new Blob(parts.concat(central,[eocd]),{type:'application/zip'});
}
function readZip(buf){
  var dv=new DataView(buf), u8=new Uint8Array(buf), dec=new TextDecoder(), out=[], i=0;
  while(i+30<=u8.length && dv.getUint32(i,true)===0x04034b50){
    var comp=dv.getUint16(i+8,true), csize=dv.getUint32(i+18,true), nameLen=dv.getUint16(i+26,true), extraLen=dv.getUint16(i+28,true);
    var name=dec.decode(u8.subarray(i+30,i+30+nameLen));
    var ds=i+30+nameLen+extraLen; var data=u8.subarray(ds,ds+csize);
    out.push({name:name, text: comp===0 ? dec.decode(data) : null});
    i=ds+csize;
  }
  return out;
}

/* ============ EDIT HELPERS ============ */
/* Rich prose fields (multiline) store "safe HTML": escaped text + <b>/<i> tags, with \n for line breaks.
   sanitizeRich() is the ONLY entry point for untrusted content (typing/paste/import) — it whitelists
   bold+italic, drops everything else, and uses DOMParser so no scripts/resources ever run. */
function sanitizeRich(html){
  function e2(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  var doc=new DOMParser().parseFromString('<body>'+String(html==null?'':html)+'</body>','text/html');
  var out='';
  (function walk(node){
    for(var n=node.firstChild;n;n=n.nextSibling){
      if(n.nodeType===3){ out+=e2(n.nodeValue); }
      else if(n.nodeType===1){
        var tag=n.nodeName.toLowerCase();
        if(tag==='br'){ out+='\n'; }
        else if(tag==='b'||tag==='strong'){ out+='<b>'; walk(n); out+='</b>'; }
        else if(tag==='i'||tag==='em'){ out+='<i>'; walk(n); out+='</i>'; }
        else if(tag==='div'||tag==='p'){ if(out&&!/\n$/.test(out))out+='\n'; walk(n); out+='\n'; }
        else { walk(n); }
      }
    }
  })(doc.body);
  return out.replace(/\u00a0/g,' ').replace(/<(b|i)>\s*<\/\1>/g,'').replace(/\n{3,}/g,'\n\n').replace(/^\n+|\n+$/g,'');
}

var IMG_MAX=1000;
function processImage(file,cb){
  var t=file.type; var reader=new FileReader();
  reader.onload=function(){ var url=reader.result;
    if(t!=='image/jpeg' && t!=='image/png'){ cb(url); return; } /* gif/webp untouched — keep animation */
    var img=new Image();
    img.onload=function(){ var w=img.naturalWidth,h=img.naturalHeight,scale=Math.min(1,IMG_MAX/Math.max(w,h)); if(scale>=1){ cb(url); return; }
      var cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale)); var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(img,0,0,cw,ch);
      var mime=(t==='image/png')?'image/png':'image/jpeg'; var out; try{ out=(mime==='image/jpeg')?cv.toDataURL(mime,0.85):cv.toDataURL(mime); }catch(e){ out=null; }
      cb((out&&out.length<url.length)?out:url); };
    img.onerror=function(){ cb(url); }; img.src=url;
  };
  reader.readAsDataURL(file);
}
function readImages(files,cb){ var arr=[].slice.call(files),out=[],n=arr.length; if(!n){cb([]);return;} var done=0; arr.forEach(function(f,idx){ processImage(f,function(u){ out[idx]=u; done++; if(done===n) cb(out); }); }); }

/* ============ SAVE / OPEN ============ */
function downloadFile(name, text){ var blob=new Blob([text],{type:'text/html'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000); }
/* ---- save target: File System Access API lets us overwrite a chosen file (and re-save to it silently) ---- */
var supportsFS = !!(window.showSaveFilePicker);
var saveHandle = null;
function setSaveTarget(h){ saveHandle=h||null; var el=document.getElementById('fileName'); if(el) el.textContent = h ? ('↳ '+h.name) : ''; var b=document.getElementById('btnSave'); if(b) b.textContent = h ? 'Save' : 'Save .zip'; }
function zipSuggestedName(){ return (slugify(ws.title)||'projects')+'.zip'; }
function ensureWrite(h){ if(!h.queryPermission) return Promise.resolve('granted'); return h.queryPermission({mode:'readwrite'}).then(function(p){ return p==='granted' ? p : h.requestPermission({mode:'readwrite'}); }); }
/* gather every file (html pages + embedded fonts) for the zip */
function collectZipFiles(){
  usedFolders={}; var files=buildAllFiles(ws);
  var used={}; function add(id){ var f=faceById(id); if(f) used[f.id]=f; }
  add(ws.headFont); add(ws.bodyFont); ws.projects.forEach(function(p){ add(p.headFont); add(p.bodyFont); });
  var jobs=[];
  Object.keys(used).forEach(function(k){ var f=used[k]; ['file','ital'].forEach(function(kk){ if(f[kk]){ var path='fonts/'+f.dir+'/'+f[kk]; jobs.push(fetch(path).then(function(r){ if(!r.ok) throw 0; return r.arrayBuffer(); }).then(function(ab){ files.push({name:'fonts/'+f.dir+'/'+f[kk], bytes:new Uint8Array(ab)}); }).catch(function(){})); } }); });
  return Promise.all(jobs).then(function(){ return files; });
}
function downloadBlob(blob,name){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1500); }
function doSave(forcePicker){
  var btn=document.getElementById('btnSave'); btn.textContent='Saving…';
  var restore=function(){ btn.textContent = saveHandle ? 'Save' : 'Save .zip'; };
  /* grab the file handle first, while the click's user-gesture is still active (before any await).
     status: 'ok' = have a writable handle, 'abort' = user cancelled, 'download' = fall back to a plain download */
  var pick;
  if(supportsFS && (forcePicker || !saveHandle)){
    try{ pick = window.showSaveFilePicker({ suggestedName: zipSuggestedName(), types:[{description:'Zip archive', accept:{'application/zip':['.zip']}}] }).then(function(h){ setSaveTarget(h); return 'ok'; }); }
    catch(e){ pick = Promise.resolve('download'); }
  } else { pick = Promise.resolve('ok'); }
  pick.catch(function(err){ return (err && err.name==='AbortError') ? 'abort' : 'download'; })
    .then(function(status){
      if(status==='abort'){ restore(); return; }
      return collectZipFiles().then(function(files){
        var blob=buildZip(files);
        if(status==='ok' && supportsFS && saveHandle){
          return ensureWrite(saveHandle)
            .then(function(p){ if(p!=='granted') throw {name:'AbortError'}; return saveHandle.createWritable(); })
            .then(function(w){ return w.write(blob).then(function(){ return w.close(); }); })
            .then(clearDirty)
            .catch(function(err){ if(!(err && err.name==='AbortError')){ downloadBlob(blob, zipSuggestedName()); clearDirty(); } });
        }
        downloadBlob(blob, zipSuggestedName()); clearDirty();
      }).then(restore);
    });
}
document.getElementById('btnSave').onclick=function(){ doSave(false); };
document.getElementById('btnSaveAs').onclick=function(){ doSave(true); };
if(supportsFS){ document.getElementById('btnSaveAs').style.display=''; }
else { var _fc=document.getElementById('fileName'); if(_fc){ _fc.textContent='overwrite: use Arc/Chrome/Edge'; _fc.title='This browser (Firefox/Safari) can’t write files in place, so Save downloads a copy. For true overwrite, open this page in Arc, Chrome or Edge. In Firefox you can also turn on Settings → Downloads → “Always ask you where to save files”, then replace the existing .zip from the save dialog.'; } }

function parseJSONScript(doc,id){ var s=doc.getElementById(id); if(!s) return null; try{ return JSON.parse(s.textContent); }catch(e){ return null; } }
/* normalize the multiline prose fields of an imported character to the sanitized rich-text form */
function normalizeRichFields(ch){
  /* pre-convert stored \n (paragraph/line structure) to <br> so it survives HTML re-parsing */
  function norm(x){ return sanitizeRich(richToEditor(x)); }
  if(ch.summary!=null) ch.summary=norm(ch.summary);
  (ch.bio||[]).forEach(function(s){ if(s.body!=null) s.body=norm(s.body); });
  (ch.relationships||[]).forEach(function(r){ if(r.body!=null) r.body=norm(r.body); });
  (ch.excerpts||[]).forEach(function(e){ if(e.body!=null) e.body=norm(e.body); });
}
function importFiles(list){
  try{
    var parser=new DOMParser(); var projMap={}; var order=[]; var wsMeta=null;
    list.forEach(function(f){
      if(!/\.html?$/i.test(f.path)) return;
      var parts=f.path.split('/').filter(Boolean); var folder = parts.length>1 ? parts[parts.length-2] : ''; var base=parts[parts.length-1];
      var doc=parser.parseFromString(f.text,'text/html');
      if(base.toLowerCase()==='index.html'){ var wm=parseJSONScript(doc,'workspace-data'); if(wm){ wsMeta=wm; return; } }
      if(base.toLowerCase()==='main.html'){ var meta=parseJSONScript(doc,'project-data'); if(meta){ projMap[folder]=projMap[folder]||{id:uid(),name:folder,genre:'',palette:'slate',headFont:'playfair-display',bodyFont:'eb-garamond',characters:[]}; projMap[folder].name=meta.name||folder; projMap[folder].genre=meta.genre||''; projMap[folder].palette=meta.palette||'slate'; projMap[folder].headFont=meta.headFont||'playfair-display'; projMap[folder].bodyFont=meta.bodyFont||'eb-garamond'; projMap[folder].headScale=meta.headScale||1; projMap[folder].bodyScale=meta.bodyScale||1; if(order.indexOf(folder)<0)order.push(folder); } return; }
      var ch=parseJSONScript(doc,'wiki-data');
      if(ch){ if(!ch.id) ch.id=uid(); normalizeRichFields(ch); var fk=folder||'project'; projMap[fk]=projMap[fk]||{id:uid(),name:fk,genre:'',palette:'slate',headFont:'playfair-display',bodyFont:'eb-garamond',characters:[]}; projMap[fk].characters.push(ch); if(order.indexOf(fk)<0)order.push(fk); }
    });
    var projects=order.map(function(k){return projMap[k];}).filter(Boolean);
    if(!projects.length){ alert('No character/project files found in that folder or zip.'); return; }
    ws={ title:(wsMeta&&wsMeta.title)||'Your Projects', palette:(wsMeta&&wsMeta.palette)||'slate', headFont:(wsMeta&&wsMeta.headFont)||'playfair-display', bodyFont:(wsMeta&&wsMeta.bodyFont)||'eb-garamond', headScale:(wsMeta&&wsMeta.headScale)||1, bodyScale:(wsMeta&&wsMeta.bodyScale)||1, projects:projects };
    curProjId=projects[0].id; curCharId=projects[0].characters[0]?projects[0].characters[0].id:null; view='projects'; clearDirty(); render();
  }catch(err){ alert('Could not read those files.'); }
}

window.addEventListener('beforeunload',function(e){ if(dirty){ e.preventDefault(); e.returnValue=''; } });

/* ============ BOOT ============ */
ws=defaultWorkspace(); curProjId=ws.projects[0].id; curCharId=ws.projects[0].characters[0].id; view='projects';
render();
</script>
